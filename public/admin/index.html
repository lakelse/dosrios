<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager | Dos Ríos</title>
</head>
<body>
  <script>
    const bc = new BroadcastChannel('decap-oauth');
    bc.onmessage = function(e) {
      if (e.data === 'authorizing:github') {
        // Forward handshake to Decap so it registers its auth listener
        window.dispatchEvent(new MessageEvent('message', {
          data: e.data,
          origin: window.location.origin,
        }));
        // Ack back to popup (replaces the severed authWindow.postMessage)
        bc.postMessage('authorizing:github');
      } else if (e.data.startsWith('authorization:github:')) {
        // Forward token to Decap
        window.dispatchEvent(new MessageEvent('message', {
          data: e.data,
          origin: window.location.origin,
        }));
      }
    };
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
